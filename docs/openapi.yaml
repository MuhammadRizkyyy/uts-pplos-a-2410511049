openapi: 3.1.0
info:
  title: Sistem Manajemen Kos API
  version: 1.0.0
  description: |
    API untuk Sistem Manajemen Kos - UTS PPLOS Semester Genap 2025/2026
    
    **Muhammad Rizky - 2410511049 - Kelas A**
    
    ## Arsitektur
    Sistem ini menggunakan arsitektur microservices dengan 3 service utama:
    - **Auth Service** (Node.js) - JWT & GitHub OAuth
    - **Property Service** (PHP CodeIgniter 4) - Manajemen properti & kamar
    - **Booking Service** (Node.js) - Booking & pembayaran
    
    Semua request melalui **API Gateway** di port 8000.
    
    ## Role-Based Access Control
    
    ### Owner (Pemilik Properti)
    - ✅ Membuat, mengedit, menghapus properti miliknya
    - ✅ Menambah, mengedit, menghapus kamar di properti miliknya
    - ✅ Melihat semua booking yang masuk ke propertinya
    - ✅ Mengubah status booking (konfirmasi/tolak)
    - ✅ Melihat pembayaran dari tenant
    - ❌ Tidak bisa membuat booking
    - ❌ Tidak bisa akses payment history (khusus tenant)
    
    ### Tenant (Penyewa)
    - ✅ Melihat semua properti dan kamar (read-only)
    - ✅ Membuat booking kamar
    - ✅ Melihat booking miliknya sendiri
    - ✅ Melakukan pembayaran untuk bookingnya
    - ✅ Melihat riwayat pembayaran miliknya
    - ❌ Tidak bisa membuat/edit/hapus properti
    - ❌ Tidak bisa membuat/edit/hapus kamar
    - ❌ Tidak bisa mengubah status booking
    
    ## Autentikasi
    Gunakan Bearer token di header Authorization:
    ```
    Authorization: Bearer <your_access_token>
    ```
    
    Access token berlaku 15 menit, refresh token 7 hari.
    
  contact:
    name: Muhammad Rizky
    email: rizky@example.com
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Development Server (API Gateway)

tags:
  - name: Authentication
    description: Autentikasi JWT & GitHub OAuth (Public & Authenticated)
  - name: Properties
    description: Manajemen properti kos (Owner untuk write, All untuk read)
  - name: Rooms
    description: Manajemen kamar (Owner untuk write, All untuk read)
  - name: Bookings
    description: Manajemen booking (Tenant untuk create, Owner untuk approve)
  - name: Payments
    description: Manajemen pembayaran (Tenant only)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token dari endpoint login
  
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Error message
    
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Budi Owner
        email:
          type: string
          example: owner@test.com
        role:
          type: string
          enum: [owner, tenant]
          example: owner
        avatar:
          type: string
          nullable: true
          example: https://avatars.githubusercontent.com/u/123456
        created_at:
          type: string
          format: date-time
    
    Property:
      type: object
      properties:
        id:
          type: integer
          example: 1
        owner_id:
          type: integer
          example: 1
        name:
          type: string
          example: Kos Melati
        address:
          type: string
          example: Jl. Melati No. 10
        city:
          type: string
          example: Jakarta Selatan
        province:
          type: string
          example: DKI Jakarta
        type:
          type: string
          enum: [kos, kontrakan, apartemen]
          example: kos
        description:
          type: string
          nullable: true
          example: Kos nyaman dekat kampus
        facilities:
          type: array
          items:
            type: string
          example: ["wifi", "ac", "parkir"]
        rules:
          type: array
          items:
            type: string
          example: ["no smoking", "no pets"]
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    Room:
      type: object
      properties:
        id:
          type: integer
          example: 1
        property_id:
          type: integer
          example: 1
        room_number:
          type: string
          example: A01
        type:
          type: string
          example: standard
        price_per_month:
          type: number
          format: decimal
          example: 1500000
        size_sqm:
          type: number
          format: decimal
          example: 12
        status:
          type: string
          enum: [available, occupied, maintenance]
          example: available
        facilities:
          type: array
          items:
            type: string
          example: ["kasur", "lemari", "meja"]
        description:
          type: string
          nullable: true
          example: Kamar standar lantai 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    Booking:
      type: object
      properties:
        id:
          type: integer
          example: 1
        tenant_id:
          type: integer
          example: 2
        owner_id:
          type: integer
          example: 1
        property_id:
          type: integer
          example: 1
        room_id:
          type: integer
          example: 1
        start_date:
          type: string
          format: date
          example: "2026-05-01"
        end_date:
          type: string
          format: date
          example: "2026-08-01"
        total_price:
          type: number
          format: decimal
          example: 4500000
        status:
          type: string
          enum: [pending, confirmed, active, completed, cancelled]
          example: pending
        notes:
          type: string
          nullable: true
          example: Mohon konfirmasi secepatnya
        created_at:
          type: string
          format: date-time
    
    Payment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        booking_id:
          type: integer
          example: 1
        amount:
          type: number
          format: decimal
          example: 1500000
        method:
          type: string
          enum: [transfer, cash, ewallet]
          example: transfer
        status:
          type: string
          enum: [pending, completed, failed]
          example: completed
        notes:
          type: string
          nullable: true
          example: Pembayaran bulan Mei 2026
        created_at:
          type: string
          format: date-time

paths:
  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register user baru
      description: |
        **Role:** Public (tidak perlu login)
        
        Registrasi user dengan role owner atau tenant.
        - **Owner**: Untuk pemilik properti/kos
        - **Tenant**: Untuk penyewa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - role
              properties:
                name:
                  type: string
                  example: Budi Owner
                email:
                  type: string
                  format: email
                  example: owner@test.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: password123
                role:
                  type: string
                  enum: [owner, tenant]
                  example: owner
      responses:
        '201':
          description: User berhasil didaftarkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User registered successfully
                  userId:
                    type: integer
                    example: 1
        '409':
          description: Email sudah terdaftar
        '422':
          description: Validasi error

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login dengan email & password
      description: |
        **Role:** Public (tidak perlu login)
        
        Login dan dapatkan access token + refresh token.
        Access token berlaku 15 menit, refresh token 7 hari.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: owner@test.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Kredensial tidak valid

  /api/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: |
        **Role:** Public (tidak perlu login)
        
        Dapatkan access token baru menggunakan refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token berhasil di-refresh
        '401':
          description: Refresh token tidak valid

  /api/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout
      description: |
        **Role:** Public (tidak perlu login)
        
        Invalidate refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '204':
          description: Logout berhasil

  /api/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: |
        **Role:** Owner & Tenant
        
        Dapatkan informasi user yang sedang login.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Data user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  /api/auth/oauth/github:
    get:
      tags:
        - Authentication
      summary: GitHub OAuth - Step 1
      description: |
        **Role:** Public (tidak perlu login)
        
        Redirect ke GitHub untuk authorize. Buka di browser!
      responses:
        '302':
          description: Redirect ke GitHub

  /api/auth/oauth/github/callback:
    get:
      tags:
        - Authentication
      summary: GitHub OAuth - Step 2
      description: |
        **Role:** Public (tidak perlu login)
        
        Callback dari GitHub setelah authorize.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Login berhasil

  /api/properties:
    get:
      tags:
        - Properties
      summary: List semua properti
      description: |
        **Role:** Owner & Tenant (semua bisa akses)
        
        Dapatkan daftar properti dengan paging & filter.
        - Owner: bisa lihat semua properti
        - Tenant: bisa lihat semua properti untuk cari kos
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
        - name: city
          in: query
          schema:
            type: string
          description: Filter berdasarkan kota
        - name: type
          in: query
          schema:
            type: string
            enum: [kos, kontrakan, apartemen]
        - name: owner_id
          in: query
          schema:
            type: integer
          description: Filter berdasarkan owner
      responses:
        '200':
          description: List properti
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Property'
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
    
    post:
      tags:
        - Properties
      summary: Buat properti baru
      description: |
        **Role:** Owner only
        
        Owner membuat properti baru. Tenant tidak bisa akses endpoint ini.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - address
                - city
                - province
                - type
              properties:
                name:
                  type: string
                  example: Kos Melati
                address:
                  type: string
                  example: Jl. Melati No. 10
                city:
                  type: string
                  example: Jakarta Selatan
                province:
                  type: string
                  example: DKI Jakarta
                type:
                  type: string
                  enum: [kos, kontrakan, apartemen]
                  example: kos
                description:
                  type: string
                facilities:
                  type: array
                  items:
                    type: string
                  example: ["wifi", "ac", "parkir"]
                rules:
                  type: array
                  items:
                    type: string
                  example: ["no smoking", "no pets"]
      responses:
        '201':
          description: Properti berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Property'
        '403':
          description: Hanya owner yang bisa membuat properti

  /api/properties/{id}:
    get:
      tags:
        - Properties
      summary: Detail properti
      description: |
        **Role:** Owner & Tenant (semua bisa akses)
        
        Dapatkan detail properti berdasarkan ID, termasuk daftar kamar.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detail properti
        '404':
          description: Properti tidak ditemukan
    
    put:
      tags:
        - Properties
      summary: Update properti
      description: |
        **Role:** Owner only (hanya pemilik properti ini)
        
        Owner update properti miliknya. Tidak bisa update properti orang lain.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                description:
                  type: string
                facilities:
                  type: array
                  items:
                    type: string
                rules:
                  type: array
                  items:
                    type: string
                is_active:
                  type: boolean
      responses:
        '200':
          description: Properti berhasil diupdate
        '403':
          description: Forbidden - bukan pemilik properti atau bukan owner
        '404':
          description: Properti tidak ditemukan
    
    delete:
      tags:
        - Properties
      summary: Hapus properti
      description: |
        **Role:** Owner only (hanya pemilik properti ini)
        
        Owner hapus properti miliknya.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Properti berhasil dihapus
        '403':
          description: Forbidden
        '404':
          description: Properti tidak ditemukan

  /api/properties/{propertyId}/rooms:
    get:
      tags:
        - Rooms
      summary: List kamar di properti
      description: |
        **Role:** Owner & Tenant (semua bisa akses)
        
        Dapatkan daftar kamar berdasarkan properti.
      security:
        - bearerAuth: []
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [available, occupied, maintenance]
        - name: type
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List kamar
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Room'
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
    
    post:
      tags:
        - Rooms
      summary: Buat kamar baru
      description: |
        **Role:** Owner only (hanya pemilik properti ini)
        
        Owner menambah kamar di propertinya.
      security:
        - bearerAuth: []
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - room_number
                - type
                - price_per_month
              properties:
                room_number:
                  type: string
                  example: A01
                type:
                  type: string
                  example: standard
                price_per_month:
                  type: number
                  example: 1500000
                size_sqm:
                  type: number
                  example: 12
                facilities:
                  type: array
                  items:
                    type: string
                  example: ["kasur", "lemari", "meja"]
                description:
                  type: string
      responses:
        '201':
          description: Kamar berhasil dibuat
        '403':
          description: Forbidden - bukan pemilik properti atau bukan owner

  /api/rooms/{id}:
    get:
      tags:
        - Rooms
      summary: Detail kamar
      description: |
        **Role:** Owner & Tenant (semua bisa akses)
        
        Dapatkan detail kamar berdasarkan ID, termasuk info properti.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detail kamar
        '404':
          description: Kamar tidak ditemukan
    
    put:
      tags:
        - Rooms
      summary: Update kamar
      description: |
        **Role:** Owner only (hanya pemilik properti kamar ini)
        
        Owner update kamar miliknya.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                room_number:
                  type: string
                type:
                  type: string
                price_per_month:
                  type: number
                size_sqm:
                  type: number
                status:
                  type: string
                  enum: [available, occupied, maintenance]
                facilities:
                  type: array
                  items:
                    type: string
                description:
                  type: string
      responses:
        '200':
          description: Kamar berhasil diupdate
        '403':
          description: Forbidden
        '404':
          description: Kamar tidak ditemukan
    
    delete:
      tags:
        - Rooms
      summary: Hapus kamar
      description: |
        **Role:** Owner only (hanya pemilik properti kamar ini)
        
        Owner hapus kamar miliknya.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Kamar berhasil dihapus
        '403':
          description: Forbidden
        '404':
          description: Kamar tidak ditemukan

  /api/bookings:
    get:
      tags:
        - Bookings
      summary: List booking
      description: |
        **Role:** Owner & Tenant
        
        Dapatkan daftar booking:
        - **Tenant**: hanya booking miliknya sendiri
        - **Owner**: booking properti miliknya
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, active, completed, cancelled]
      responses:
        '200':
          description: List booking
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
    
    post:
      tags:
        - Bookings
      summary: Buat booking baru
      description: |
        **Role:** Tenant only
        
        Tenant membuat booking kamar. Owner tidak bisa membuat booking.
        
        Total harga dihitung otomatis berdasarkan durasi dan harga per bulan.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roomId
                - startDate
                - endDate
              properties:
                roomId:
                  type: integer
                  example: 1
                startDate:
                  type: string
                  format: date
                  example: "2026-05-01"
                endDate:
                  type: string
                  format: date
                  example: "2026-08-01"
                notes:
                  type: string
                  example: Mohon konfirmasi secepatnya
      responses:
        '201':
          description: Booking berhasil dibuat
        '403':
          description: Hanya tenant yang bisa membuat booking
        '404':
          description: Kamar tidak ditemukan
        '409':
          description: Kamar tidak tersedia

  /api/bookings/{id}:
    get:
      tags:
        - Bookings
      summary: Detail booking
      description: |
        **Role:** Owner & Tenant (hanya yang terlibat)
        
        Dapatkan detail booking:
        - Tenant hanya bisa lihat booking miliknya
        - Owner hanya bisa lihat booking propertinya
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detail booking
        '403':
          description: Forbidden
        '404':
          description: Booking tidak ditemukan

  /api/bookings/{id}/status:
    patch:
      tags:
        - Bookings
      summary: Update status booking
      description: |
        **Role:** Owner only (hanya pemilik properti booking ini)
        
        Owner mengubah status booking untuk konfirmasi/tolak/dll.
        Tenant tidak bisa mengubah status.
        
        **Status yang tersedia:**
        - `pending`: Menunggu konfirmasi owner
        - `confirmed`: Dikonfirmasi owner
        - `active`: Sedang berlangsung
        - `completed`: Selesai
        - `cancelled`: Dibatalkan
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [pending, confirmed, active, completed, cancelled]
                  example: confirmed
      responses:
        '200':
          description: Status berhasil diupdate
        '403':
          description: Hanya owner yang bisa update status
        '404':
          description: Booking tidak ditemukan
        '422':
          description: Status tidak valid

  /api/bookings/{bookingId}/payments:
    get:
      tags:
        - Payments
      summary: List pembayaran booking
      description: |
        **Role:** Owner & Tenant (yang terlibat)
        
        Dapatkan daftar pembayaran untuk booking tertentu:
        - Tenant hanya bisa lihat pembayaran bookingnya
        - Owner bisa lihat pembayaran booking propertinya
      security:
        - bearerAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List pembayaran
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
        '403':
          description: Forbidden
        '404':
          description: Booking tidak ditemukan
    
    post:
      tags:
        - Payments
      summary: Buat pembayaran
      description: |
        **Role:** Tenant only (hanya pemilik booking ini)
        
        Tenant membuat pembayaran untuk bookingnya.
        
        **Method pembayaran:**
        - `transfer`: Transfer bank
        - `cash`: Tunai
        - `ewallet`: E-wallet (GoPay, OVO, dll)
      security:
        - bearerAuth: []
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - method
              properties:
                amount:
                  type: number
                  example: 1500000
                method:
                  type: string
                  enum: [transfer, cash, ewallet]
                  example: transfer
                notes:
                  type: string
                  example: Pembayaran bulan Mei 2026
      responses:
        '201':
          description: Pembayaran berhasil dibuat
        '403':
          description: Forbidden - bukan pemilik booking
        '404':
          description: Booking tidak ditemukan
        '422':
          description: Method tidak valid

  /api/bookings/payments/history:
    get:
      tags:
        - Payments
      summary: Riwayat pembayaran tenant
      description: |
        **Role:** Tenant only
        
        Dapatkan riwayat semua pembayaran yang pernah dilakukan tenant.
        Owner tidak bisa akses endpoint ini.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Riwayat pembayaran
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
        '403':
          description: Hanya tenant yang bisa akses payment history
